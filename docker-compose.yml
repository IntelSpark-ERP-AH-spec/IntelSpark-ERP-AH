services:
  intelsheets:
    build:
      context: .
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKUP_DIR: /app/backups
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: "true"
      METRICS_ALLOW_UNAUTHENTICATED: "true"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - intelsheets-data:/app/data
      - intelsheets-backups:/app/backups
    restart: always
    init: true
    stop_grace_period: 30s
    pids_limit: 256
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: always
    volumes:
      - intelsheets-redis:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.4.2
    profiles: ["monitoring"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - intelsheets-prometheus:/prometheus
    restart: unless-stopped
    depends_on:
      intelsheets:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: ["monitoring"]
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.2
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - intelsheets-grafana:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/intelsheets.yml:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  intelsheets-data:
  intelsheets-backups:
  intelsheets-redis:
  intelsheets-prometheus:
  intelsheets-grafana:
