[build]
  command = "npm --prefix frontend run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["better-sqlite3"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
