name: Qualite et securite

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Installer serveur
        run: npm ci
      - name: Installer interface
        run: npm ci --prefix frontend
      - name: Tester securite
        run: npm test
      - name: Verifier syntaxe serveur
        run: node --check server.js
      - name: Controler interface
        run: npm run lint --prefix frontend
      - name: Compiler interface
        run: npm run build --prefix frontend
      - name: Auditer serveur
        run: npm audit --omit=dev --audit-level=moderate
      - name: Auditer interface
        run: npm audit --prefix frontend --omit=dev --audit-level=moderate
